<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wedding Planner Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lavender: {
                            light: '#E6D6FF',
                            DEFAULT: '#CBA6F7',
                            dark: '#B084E6'
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F9FA; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E6D6FF; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBA6F7; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; pointer-events: none; }
        .toast {
            background-color: white; border-left: 5px solid #CBA6F7;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 16px 24px; border-radius: 8px; margin-top: 10px; display: flex;
            align-items: center; gap: 12px; transform: translateX(100%);
            animation: slideIn 0.3s forwards, fadeOut 0.3s forwards 2.7s;
            pointer-events: auto;
        }
        @keyframes slideIn { to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }
        
        .sticky-note { background: #FFFCE8; border: 1px solid #F2EFC2; box-shadow: 2px 4px 10px rgba(0,0,0,0.03); }
        .status-select { text-align-last: center; }
        
        /* Background khusus untuk area login */
        .login-bg {
            background-color: #F8F9FA;
            background-image: radial-gradient(#CBA6F7 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="text-gray-800 flex h-screen overflow-hidden relative">

    <div id="page-loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <i class="fa-solid fa-ring text-lavender text-4xl mb-3 animate-pulse"></i>
        <p class="text-sm text-gray-500 font-medium">Memverifikasi akses...</p>
    </div>

    <div id="login-ui" class="hidden absolute inset-0 z-40 login-bg items-center justify-center p-4">
        <div class="bg-white/80 backdrop-blur-xl p-8 md:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white max-w-md w-full fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-lavender-light rounded-2xl flex items-center justify-center mx-auto mb-4 text-lavender-dark text-2xl shadow-inner">
                    <i class="fa-solid fa-ring"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-wide">DESTARA</h1>
                <p class="text-sm text-gray-400 mt-1">Premium Wedding Dashboard</p>
            </div>

            <div id="error-alert" class="hidden mb-5 p-3 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3 text-red-600 text-sm">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="error-message">Email atau password salah.</span>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Email Akses</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <input type="email" id="login-email" required class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm outline-none focus:bg-white focus:ring-2 focus:ring-lavender focus:border-transparent transition-all" placeholder="admin@destara.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Kata Sandi</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="login-password" required class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm outline-none focus:bg-white focus:ring-2 focus:ring-lavender focus:border-transparent transition-all" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" id="btn-login" class="w-full py-3 mt-4 bg-lavender text-white rounded-xl shadow-lg shadow-lavender/30 hover:bg-lavender-dark hover:shadow-lavender/50 transition-all font-semibold flex justify-center items-center gap-2">
                    <span>Masuk ke Dashboard</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </form>
        </div>
    </div>


    <div id="dashboard-ui" class="hidden w-full h-full flex overflow-hidden relative z-10">
        <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="w-64 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.04)] flex flex-col transition-transform duration-300 z-30 absolute lg:relative h-full -translate-x-full lg:translate-x-0">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h1 class="text-xl font-bold text-lavender-dark tracking-wide">
                    <i class="fa-solid fa-ring mr-2"></i>DESTARA
                </h1>
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-lavender">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto py-4" id="sidebar-menu"></div>
        </aside>

        <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
            <header class="bg-white/80 backdrop-blur-md shadow-sm py-4 px-6 flex justify-between items-center z-10">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden text-gray-500 hover:text-lavender transition">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h2 id="page-title" class="text-xl font-semibold text-gray-700">Dashboard</h2>
                </div>
                <div class="flex items-center gap-3">
                    <div id="user-profile" class="w-10 h-10 rounded-full bg-lavender-light flex items-center justify-center text-lavender-dark font-bold shadow-sm">
                        MD
                    </div>
                    <button id="btn-logout" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition" title="Keluar">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8" id="main-content"></main>
        </div>
    </div>

    <div id="toast-container"></div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDIvPy_2z1-BpKjAxUE-0VHhELqx3DHepM",
            authDomain: "desara-9027a.firebaseapp.com",
            projectId: "desara-9027a",
            storageBucket: "desara-9027a.firebasestorage.app",
            messagingSenderId: "865899813290",
            appId: "1:865899813290:web:05453a36ef1608d40b73d3"        
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- SISTEM LOGIN & PROTEKSI PADA SINGLE PAGE ---
        const pageLoader = document.getElementById('page-loader');
        const loginUI = document.getElementById('login-ui');
        const dashboardUI = document.getElementById('dashboard-ui');
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Berhasil Login -> Tampilkan Dashboard
                loginUI.classList.add('hidden');
                loginUI.classList.remove('flex');
                dashboardUI.classList.remove('hidden');
                pageLoader.style.display = 'none';

                // Set inisial ke profile icon
                const emailInitials = user.email.substring(0, 2).toUpperCase();
                document.getElementById('user-profile').innerText = emailInitials;

                await initApp();
            } else {
                // Belum Login -> Tampilkan Form Login
                dashboardUI.classList.add('hidden');
                pageLoader.classList.add('opacity-0');
                
                setTimeout(() => {
                    pageLoader.style.display = 'none';
                    loginUI.classList.remove('hidden');
                    loginUI.classList.add('flex');
                }, 300);
            }
        });

        // Event Listener Login Submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnLogin = document.getElementById('btn-login');
            const errorAlert = document.getElementById('error-alert');
            const errorMessage = document.getElementById('error-message');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            const originalBtnText = btnLogin.innerHTML;
            btnLogin.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>Memverifikasi...</span>`;
            btnLogin.disabled = true;
            errorAlert.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                btnLogin.innerHTML = originalBtnText;
                btnLogin.disabled = false;
                errorAlert.classList.remove('hidden');
                if(error.code === 'auth/invalid-credential') {
                    errorMessage.innerText = "Email atau kata sandi tidak cocok.";
                } else {
                    errorMessage.innerText = "Terjadi kesalahan. Silakan coba lagi.";
                }
            }
        });

        // Event Listener Logout
        document.getElementById('btn-logout').addEventListener('click', async () => {
            if(confirm('Apakah Anda yakin ingin keluar dari dashboard?')) {
                try {
                    await signOut(auth);
                } catch (error) {
                    showToast('Gagal logout: ' + error.message, 'error');
                }
            }
        });

        // ==========================================================
        // SISTEM DASHBOARD (DATA & UI LOGIC)
        // ==========================================================
        const menus = [
            { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard Overview' },
            { id: 'mahar', icon: 'fa-gem', label: 'Mahar' },
            { id: 'seserahan', icon: 'fa-gift', label: 'Seserahan' },
            { id: 'wedding_list', icon: 'fa-users', label: 'Wedding List' },
            { id: 'catering', icon: 'fa-utensils', label: 'Catering' },
            { id: 'vendor', icon: 'fa-store', label: 'Vendor List' },
            { id: 'timeline', icon: 'fa-clock', label: 'Timeline / Rundown' },
            { id: 'checklist', icon: 'fa-list-check', label: 'Checklist Persiapan' },
            { id: 'notes', icon: 'fa-sticky-note', label: 'Notes / Catatan' },
            { id: 'attire', icon: 'fa-tshirt', label: 'Attire & MUA' },
            { id: 'dekor', icon: 'fa-leaf', label: 'Dekorasi' }
        ];

        let activeMenu = 'dashboard';
        let editId = null;
        let appData = { totalBudget: 0, items: {} };
        menus.forEach(m => { if(m.id !== 'dashboard') appData.items[m.id] = []; });

        // Filter state untuk Seserahan Status
        window.seserahanFilter = 'semua';
        window.setSeserahanFilter = function(f) {
            window.seserahanFilter = f;
            renderTable('seserahan');
        }

        // Filter state untuk Seserahan Kategori
        window.seserahanCategoryFilter = 'all';
        window.setSeserahanCategory = function(cat) {
            window.seserahanCategoryFilter = cat;
            renderTable('seserahan');
        }

        // --- TAMBAHAN FILTER WEDDING LIST ---
        window.weddingFilter = 'all';
        window.setWeddingFilter = function(f) {
            window.weddingFilter = f;
            renderTable('wedding_list');
        }

        window.weddingPihakFilter = 'all';
        window.setWeddingPihakFilter = function(f) {
            window.weddingPihakFilter = f;
            renderTable('wedding_list');
        }

        window.loadData = async function(categoryId) {
            const snapshot = await getDocs(collection(db, categoryId));
            let data = [];
            snapshot.forEach(docSnap => { data.push({ id: docSnap.id, ...docSnap.data() }); });
            appData.items[categoryId] = data;
            renderTable(categoryId);
        };

        async function loadAllData() {
            for (const menu of menus) {
                if (menu.id !== 'dashboard') {
                    const snapshot = await getDocs(collection(db, menu.id));
                    let data = [];
                    snapshot.forEach(docSnap => { data.push({ id: docSnap.id, ...docSnap.data() }); });
                    appData.items[menu.id] = data;
                }
            }
        }

        async function loadBudget() {
            const docRef = doc(db, "settings", "budget");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) { appData.totalBudget = docSnap.data().totalBudget || 0; }
        }

        window.initApp = async function() {
            renderSidebar();
            document.getElementById('main-content').innerHTML = `<div class="flex flex-col items-center justify-center h-full text-lavender"><i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i><p class="font-medium text-gray-500">Memuat Sistem...</p></div>`;
            await loadBudget();
            await loadAllData(); 
            renderContent();
        }

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobile-overlay').classList.toggle('hidden');
        }

        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        }

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid ${type==='success'?'fa-circle-check text-green-500':'fa-circle-xmark text-red-500'} text-xl"></i> <p class="text-sm font-medium">${message}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getEmptyStateHTML(icon, message) {
            return `<div class="py-16 text-center text-gray-400 fade-in flex flex-col items-center">
                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4"><i class="fa-solid ${icon} text-3xl text-gray-300"></i></div>
                <p class="text-sm font-medium">${message}</p>
                <p class="text-xs text-gray-400 mt-1">Yuk, mulai tambahkan data pertamamu!</p>
            </div>`;
        }

        function renderSidebar() {
            const sidebarHtml = menus.map(menu => `
                <a href="#" onclick="changeMenu('${menu.id}')" class="flex items-center px-6 py-3 my-1 mx-3 rounded-xl transition-all duration-200 text-sm font-medium ${activeMenu === menu.id ? 'bg-lavender text-white shadow-md shadow-lavender/30' : 'text-gray-500 hover:bg-lavender-light hover:text-lavender-dark'}">
                    <i class="fa-solid ${menu.icon} w-6 text-lg"></i><span>${menu.label}</span>
                </a>
            `).join('');
            document.getElementById('sidebar-menu').innerHTML = sidebarHtml;
        }

        window.changeMenu = async function(menuId) {
            activeMenu = menuId;
            editId = null;
            document.getElementById('page-title').innerText = menus.find(m => m.id === menuId).label;
            renderSidebar();
            await renderContent();
            if(window.innerWidth < 1024) toggleSidebar(); 
        }

        window.renderContent = async function() {
            const mainContent = document.getElementById('main-content');
            if (activeMenu === 'dashboard') {
                await loadAllData(); 
                mainContent.innerHTML = getDashboardHTML();
            } else {
                mainContent.innerHTML = getCategoryHTML(activeMenu);
                await loadData(activeMenu); 
            }
        }

        window.quickUpdate = async function(categoryId, id, field, value) {
            try {
                await updateDoc(doc(db, categoryId, id), { [field]: value });
                await loadData(categoryId); 
                showToast('Status berhasil diupdate!');
            } catch (error) {
                showToast('Gagal update status!', 'error');
            }
        }

        function getDashboardHTML() {
            let totalPengeluaran = 0, totalItems = 0, itemsSelesai = 0;
            Object.keys(appData.items).forEach(key => {
                appData.items[key].forEach(item => {
                    totalPengeluaran += Number(item.nilai || item.total || item.biaya || 0);
                    totalItems++;
                    if(item.status === 'Selesai' || item.status === 'sudah' || item.status === 'dibungkus' || item.status === 'deal' || item.statusPembayaran === 'lunas') itemsSelesai++;
                });
            });
            const sisaBudget = appData.totalBudget - totalPengeluaran;
            const progress = totalItems === 0 ? 0 : Math.round((itemsSelesai / totalItems) * 100);

            return `
                <div class="fade-in space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div>
                            <h3 class="text-sm text-gray-500 font-medium">Total Anggaran Pernikahan</h3>
                            <p class="text-2xl font-bold text-gray-800">${formatRupiah(appData.totalBudget)}</p>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="budgetInput" placeholder="Set Budget Baru" class="px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-lavender w-48 text-sm">
                            <button onclick="updateBudget()" class="bg-lavender text-white px-4 py-2 rounded-lg hover:bg-lavender-dark transition shadow-sm font-medium text-sm">Update</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                            <div class="absolute -right-4 -top-4 w-24 h-24 bg-red-50 rounded-full group-hover:scale-110 transition-transform"></div>
                            <div class="relative z-10">
                                <p class="text-sm text-gray-500 font-medium mb-1">Total Pengeluaran / Estimasi</p>
                                <h4 class="text-xl font-bold text-gray-800">${formatRupiah(totalPengeluaran)}</h4>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                            <div class="absolute -right-4 -top-4 w-24 h-24 ${sisaBudget < 0 ? 'bg-red-50' : 'bg-green-50'} rounded-full group-hover:scale-110 transition-transform"></div>
                            <div class="relative z-10">
                                <p class="text-sm text-gray-500 font-medium mb-1">Sisa Anggaran</p>
                                <h4 class="text-xl font-bold ${sisaBudget < 0 ? 'text-red-500' : 'text-gray-800'}">${formatRupiah(sisaBudget)}</h4>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                            <div class="absolute -right-4 -top-4 w-24 h-24 bg-lavender-light opacity-50 rounded-full group-hover:scale-110 transition-transform"></div>
                            <div class="relative z-10">
                                <p class="text-sm text-gray-500 font-medium mb-1">Total Item Tercatat</p>
                                <h4 class="text-xl font-bold text-gray-800">${totalItems} <span class="text-sm font-normal text-gray-500">Items</span></h4>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-end mb-2">
                            <div><h3 class="text-sm text-gray-500 font-bold uppercase">Progress Sistem Keseluruhan</h3></div>
                            <span class="text-2xl font-bold text-lavender-dark">${progress}%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-3"><div class="bg-lavender h-3 rounded-full transition-all duration-1000" style="width: ${progress}%"></div></div>
                    </div>
                </div>
            `;
        }

        window.updateBudget = async function() {
            const val = document.getElementById('budgetInput').value;
            if(val) {
                appData.totalBudget = parseInt(val);
                await setDoc(doc(db, "settings", "budget"), { totalBudget: appData.totalBudget });
                renderContent(); showToast('Budget diperbarui!');
            }
        }

        function getCategoryHTML(categoryId) {
            const menuLabel = menus.find(m => m.id === categoryId).label;
            let formInner = '';
            
            if (categoryId === 'mahar') {
                formInner = `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Nama Mahar</label><input type="text" id="inputNama" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Nilai (Rp)</label><input type="number" id="inputNilai" class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Status Kesiapan</label><select id="inputStatus" class="w-full px-4 py-2 border rounded-xl bg-white text-sm outline-none"><option value="belum">🔴 Belum Siap</option><option value="sudah">✅ Sudah Siap</option></select></div>
                    <div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Deskripsi Detail</label><textarea id="inputDeskripsi" rows="2" class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></textarea></div>
                `;
            } else if (categoryId === 'seserahan') { 
                formInner = `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Nama Item</label><input type="text" id="inputNamaItem" placeholder="Contoh: Cincin Emas, Tas Wanita" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Kategori</label>
                        <select id="inputKategori" class="w-full px-4 py-2 border rounded-xl bg-white text-sm outline-none">
                                <option value="ibadah">🕌 Ibadah</option>
                                <option value="perhiasan">💍 Perhiasan</option>
                                <option value="makeup">💄 Makeup</option>
                                <option value="skincare">🧴 Skincare</option>
                                <option value="bathbody">🛁 Bath & Body</option>
                                <option value="fashion">👗 Fashion</option>
                                <option value="lainnya">📦 Lainnya</option>
                        </select>
                    </div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Jumlah</label><input type="number" id="inputJumlah" value="1" min="1" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>

                `;
            } else if (categoryId === 'catering') {
                formInner = `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Nama Vendor</label><input type="text" id="inputVendor" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Nama Paket Menu</label><input type="text" id="inputPaket" class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Harga per Pax (Rp)</label><input type="number" id="inputHargaPerPax" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Jumlah Pax Pesanan</label><input type="number" id="inputJumlahPax" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Status Pembayaran</label><select id="inputStatusBayar" class="w-full px-4 py-2 border rounded-xl bg-white text-sm outline-none"><option value="dp">🟡 DP (Down Payment)</option><option value="lunas">🟢 Lunas</option></select></div>
                `;
            } else if (categoryId === 'checklist') {
                formInner = `<div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Apa yang harus dipersiapkan?</label><input type="text" id="inputTugas" placeholder="Contoh: Cetak Undangan 500 pcs" required class="w-full px-4 py-3 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender shadow-sm"></div>`;
            } else if (categoryId === 'timeline') {
                formInner = `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Jam (Contoh: 08:00)</label><input type="time" id="inputJam" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">PIC (Penanggung Jawab)</label><input type="text" id="inputPic" placeholder="Contoh: WO / Nama Saudara" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Kegiatan</label><input type="text" id="inputKegiatan" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                `;
            } else if (categoryId === 'vendor') {
                formInner = `
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Nama Vendor</label><input type="text" id="inputNama" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Kategori Jasa (Dekor, MUA, dll)</label><input type="text" id="inputKategori" required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>
                    <div><label class="block text-xs font-medium text-gray-500 mb-1">Kontak / Sosmed</label><input type="text" id="inputKontak" class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></div>

                `;
            } else if (categoryId === 'notes') {
                formInner = `<div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Catatan Bebas</label><textarea id="inputIsi" rows="4" placeholder="Tuliskan catatan penting, inspirasi, atau ide..." required class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-lavender"></textarea></div>`;

                            </div>
                        </form>
                    </div>
                    <div id="dynamic-list-container"></div>
                </div>
            `;
        }

        window.handleFormSubmit = async function(e, categoryId) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Menyimpan...`;
            btnSubmit.disabled = true;
            
            let itemData = {};

            if (categoryId === 'mahar') {
                itemData = {
                    nama: document.getElementById('inputNama').value,
                    deskripsi: document.getElementById('inputDeskripsi').value,
                    nilai: Number(document.getElementById('inputNilai').value || 0),
                    status: document.getElementById('inputStatus').value,
                    tanggalUpdate: new Date().toISOString()
                };
            } else if (categoryId === 'seserahan') { 
                const hargaInput = document.getElementById('inputHarga').value;
                const h = hargaInput ? Number(hargaInput) : null;
                const j = Number(document.getElementById('inputJumlah').value || 1);
                itemData = {
                    namaItem: document.getElementById('inputNamaItem').value,
                    kategori: document.getElementById('inputKategori').value,
                    jumlah: j,
                    harga: h,
                    total: h ? h * j : 0,
                    status: document.getElementById('inputStatus').value,
                    catatan: document.getElementById('inputCatatan').value,
                    tanggalUpdate: new Date().toISOString()
                };
            } else if (categoryId === 'wedding_list') {
                itemData = {
                    nama: document.getElementById('inputNama').value,
                    kategori: document.getElementById('inputKategori').value,
                    pihak: document.getElementById('inputPihak').value,
                    status: document.getElementById('inputStatus').value,
                    jumlahOrang: Number(document.getElementById('inputJumlahOrang').value || 1)
                };
            } else if (categoryId === 'catering') {
                const h = Number(document.getElementById('inputHargaPerPax').value || 0);
                const p = Number(document.getElementById('inputJumlahPax').value || 0);
                itemData = {
                    vendor: document.getElementById('inputVendor').value,
                    paket: document.getElementById('inputPaket').value,
                    hargaPerPax: h,
                    jumlahPax: p,
                    total: h * p,
                    statusBayar: document.getElementById('inputStatusBayar').value
                };
            } else if (categoryId === 'checklist') {
                itemData = {
                    tugas: document.getElementById('inputTugas').value,
                    status: false,
                    createdAt: new Date().toISOString()
                };
            } else if (categoryId === 'timeline') {
                itemData = {
                    jam: document.getElementById('inputJam').value,
                    kegiatan: document.getElementById('inputKegiatan').value,
                    pic: document.getElementById('inputPic').value
                };
            } else if (categoryId === 'vendor') {
                itemData = {
                    nama: document.getElementById('inputNama').value,
                    kategori: document.getElementById('inputKategori').value,
                    kontak: document.getElementById('inputKontak').value,
                    status: document.getElementById('inputStatus').value
                };
            } else if (categoryId === 'notes') {
                itemData = {
                    isi: document.getElementById('inputIsi').value,
                    tanggal: new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'})
                };
            } else {
                itemData = {
                    nama: document.getElementById('inputNama').value,
                    biaya: Number(document.getElementById('inputBiaya').value || 0)
                };
            }

            try {
                if (editId) {
                    await updateDoc(doc(db, categoryId, editId), itemData);
                    showToast('Data berhasil diperbarui!');
                } else {
                    await addDoc(collection(db, categoryId), itemData);
                    showToast('Berhasil menambahkan data!');
                }
                resetForm();
                await loadData(categoryId); 
            } catch (error) { showToast('Gagal menyimpan!', 'error'); } 
            finally { btnSubmit.innerHTML = `<i class="fa-solid fa-plus mr-1"></i> Simpan Data`; btnSubmit.disabled = false; }
        }

        window.renderTable = function(categoryId) {
            const container = document.getElementById('dynamic-list-container');
            if(!container) return; 
            
            let data = appData.items[categoryId] || [];
            let htmlOut = '';

            if (categoryId === 'seserahan') {
                let totalBiaya = 0;
                let totalItems = data.length;
                let countDibungkus = 0;

                data.forEach(item => {
                    totalBiaya += item.total || 0;
                    if (item.status === 'dibungkus') countDibungkus++;
                });
                const progress = totalItems === 0 ? 0 : Math.round((countDibungkus / totalItems) * 100);

                let filteredData = data;
                
                if (window.seserahanFilter !== 'semua') {
                    filteredData = filteredData.filter(i => i.status === window.seserahanFilter);
                }
                if (window.seserahanCategoryFilter !== 'all') {
                    filteredData = filteredData.filter(i => i.kategori === window.seserahanCategoryFilter);
                }

                const grouped = {
                    'ibadah': [], 'perhiasan': [], 'makeup': [], 'skincare': [],
                    'bathbody': [], 'fashion': [], 'lainnya': []
                };

                const catInfo = {
                    'ibadah': { label: 'Ibadah', icon: 'fa-mosque', color: 'text-emerald-600', bg: 'bg-emerald-50' },
                    'perhiasan': { label: 'Perhiasan', icon: 'fa-ring', color: 'text-amber-500', bg: 'bg-amber-50' },
                    'makeup': { label: 'Makeup', icon: 'fa-paint-brush', color: 'text-pink-500', bg: 'bg-pink-50' },
                    'skincare': { label: 'Skincare', icon: 'fa-face-smile', color: 'text-rose-500', bg: 'bg-rose-50' },
                    'bathbody': { label: 'Bath & Body', icon: 'fa-soap', color: 'text-blue-500', bg: 'bg-blue-50' },
                    'fashion': { label: 'Fashion', icon: 'fa-shirt', color: 'text-purple-500', bg: 'bg-purple-50' },
                    'lainnya': { label: 'Lainnya', icon: 'fa-box-open', color: 'text-gray-500', bg: 'bg-gray-50' }
                };

                filteredData.forEach(item => {
                    if (grouped[item.kategori]) grouped[item.kategori].push(item);
                    else grouped['lainnya'].push(item);
                });

                htmlOut += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Total Biaya Seserahan</p>
                            <h2 class="text-3xl font-black text-lavender-dark">${formatRupiah(totalBiaya)}</h2>
                        </div>
                        <div class="flex-1 max-w-sm">
                            <div class="flex justify-between text-xs font-bold mb-2">
                                <span class="text-gray-500">Progress Pembungkusan</span>
                                <span class="text-green-600">${countDibungkus} dari ${totalItems} Selesai (${progress}%)</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-3 border border-gray-200">
                                <div class="bg-green-400 h-full rounded-full transition-all duration-700 relative overflow-hidden" style="width: ${progress}%">
                                    <div class="absolute inset-0 bg-white/20" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.3) 10px, rgba(255,255,255,0.3) 20px);"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-6 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="mb-5">
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2"><i class="fa-solid fa-list-check mr-1"></i> Filter Berdasarkan Status</p>
                            <div class="flex flex-wrap gap-2">
                                <button onclick="setSeserahanFilter('semua')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanFilter==='semua' ? 'bg-gray-800 text-white border-gray-800 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'}">Semua Status</button>
                                <button onclick="setSeserahanFilter('belum')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanFilter==='belum' ? 'bg-red-50 text-red-600 border-red-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-red-200'}">🔴 Belum Dibeli</button>
                                <button onclick="setSeserahanFilter('dibeli')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanFilter==='dibeli' ? 'bg-yellow-50 text-yellow-600 border-yellow-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-yellow-200'}">🟡 Sudah Dibeli</button>
                                <button onclick="setSeserahanFilter('dibungkus')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanFilter==='dibungkus' ? 'bg-green-50 text-green-600 border-green-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-green-200'}">🟢 Sudah Dibungkus</button>
                            </div>
                        </div>
                        
                        <div class="pt-5 border-t border-gray-100">

                            <div class="flex flex-wrap gap-2">
                                <button onclick="setSeserahanCategory('all')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanCategoryFilter==='all' ? 'bg-lavender text-white border-lavender shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-lavender'}">Semua Kategori</button>
                                <button onclick="setSeserahanCategory('ibadah')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanCategoryFilter==='ibadah' ? 'bg-emerald-50 text-emerald-600 border-emerald-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-emerald-200'}">🕌 Ibadah</button>
                                <button onclick="setSeserahanCategory('perhiasan')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanCategoryFilter==='perhiasan' ? 'bg-amber-50 text-amber-500 border-amber-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-amber-200'}">💍 Perhiasan</button>
                                <button onclick="setSeserahanCategory('makeup')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanCategoryFilter==='makeup' ? 'bg-pink-50 text-pink-500 border-pink-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-pink-200'}">💄 Makeup</button>
                                <button onclick="setSeserahanCategory('skincare')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanCategoryFilter==='skincare' ? 'bg-rose-50 text-rose-500 border-rose-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-rose-200'}">🧴 Skincare</button>
                                <button onclick="setSeserahanCategory('bathbody')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanCategoryFilter==='bathbody' ? 'bg-blue-50 text-blue-500 border-blue-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-blue-200'}">🛁 Bath & Body</button>

                                <button onclick="setSeserahanCategory('lainnya')" class="px-4 py-2 rounded-full text-xs font-bold transition-all border-2 ${window.seserahanCategoryFilter==='lainnya' ? 'bg-gray-50 text-gray-600 border-gray-200 shadow-md' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}">📦 Lainnya</button>
                            </div>
                        </div>
                    </div>
                `;

                    htmlOut += getEmptyStateHTML('fa-gift', (window.seserahanFilter === 'semua' && window.seserahanCategoryFilter === 'all') ? 'Belum ada data seserahan, yuk mulai tambahkan!' : 'Tidak ada data di filter yang dipilih.');
                } else {
                    htmlOut += `<div class="space-y-8">`;
                    Object.keys(grouped).forEach(catKey => {
                        const items = grouped[catKey];
                        if (items.length === 0) return; 
                        
                        const info = catInfo[catKey];
                        htmlOut += `
                            <div>
                                <h3 class="font-black text-gray-700 text-lg mb-4 flex items-center gap-2"><div class="w-8 h-8 rounded-lg flex items-center justify-center ${info.bg} ${info.color}"><i class="fa-solid ${info.icon} text-sm"></i></div> ${info.label}</h3>

                                    ${items.map(item => {
                                        let statusColor = item.status === 'dibungkus' ? 'bg-green-100 text-green-700 border-green-200' : 
                                                          item.status === 'dibeli' ? 'bg-yellow-100 text-yellow-700 border-yellow-200' : 
                                                          'bg-red-100 text-red-600 border-red-200';
                                        
                                        return `
                                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition relative group overflow-hidden">

            } else if(categoryId === 'wedding_list') {

                document.getElementById('inputJumlahOrang').value = item.jumlahOrang;
                document.getElementById('inputKategori').value = item.kategori; 
                document.getElementById('inputStatus').value = item.status;
                if(document.getElementById('inputPihak')) {
                    document.getElementById('inputPihak').value = item.pihak || 'pria';
                }
            }
            document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.resetForm = function() {
            editId = null;
            document.getElementById('itemForm').reset();
            document.getElementById('form-title').innerText = `Tambah Data ${menus.find(m => m.id === activeMenu).label}`;
            document.getElementById('btnSubmit').innerHTML = `<i class="fa-solid fa-plus mr-1"></i> Simpan Data`;
        }
    </script>
</body>
</html>
