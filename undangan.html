<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f8f9fa, #f3e8ff);
    text-align: center;
    padding: 40px;
}

.card {
    background: white;
    max-width: 400px;
    margin: auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
    color: #7c3aed;
}

.nama {
    font-size: 24px;
    font-weight: bold;
    margin: 10px 0;
}

.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 10px 20px;
    background: #cba6f7;
    color: white;
    border-radius: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <p>Kepada Yth:</p>
    <div id="namaTamu" class="nama">Bapak/Ibu</div>

    <h1>Undangan Pernikahan</h1>

    <p>
        Dengan penuh kebahagiaan kami mengundang Anda  
        untuk hadir di acara pernikahan kami.
    </p>

    <p><b>Destara & Mutiara</b></p>

    <a href="#" class="btn">Buka Undangan</a>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const nama = urlParams.get('to');

if(nama){
    document.getElementById('namaTamu').innerText = decodeURIComponent(nama);
}
</script>

</body>
</html>
